version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:./data/prod.db
      - CORS_ORIGIN=http://localhost:5173
      # Note: Pass HF_API_TOKEN when running docker-compose
      - HF_API_TOKEN=${HF_API_TOKEN}
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
